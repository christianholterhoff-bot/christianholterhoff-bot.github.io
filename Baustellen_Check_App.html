<title>Baustellen Check, Glasfaser</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============ Grundfarben, dunkles Design ============ */
:root{
  --grund:#14171B;        /* Asphalt, Hintergrund */
  --flaeche:#1C2127;      /* Karten und Paneele */
  --flaeche2:#242B33;     /* Eingabefelder */
  --linie:#2E3640;        /* feine Trennlinien */
  --schrift:#E9ECEF;      /* Haupttext */
  --schrift2:#93A0AD;     /* Nebentext */
  --amber:#FFB020;        /* Baustellenwarnfarbe, Hauptakzent */
  --amberdunkel:#8a5c00;
  --ja:#3FB966;           /* Bewertung Ja */
  --nein:#E5484D;         /* Bewertung Nein */
  --sicher:#FF8A3D;       /* Kennzeichen sicherheitsrelevant */
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--grund); color:var(--schrift);
  font-family:'Barlow',system-ui,sans-serif; font-size:16px;}
body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}

/* ============ Kopfzeile mit Warnband ============ */
header{position:sticky; top:0; z-index:900; background:var(--grund);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px 16px;
  border-bottom:1px solid var(--linie);}
header h1{margin:0; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700;
  font-size:20px; letter-spacing:.5px; text-transform:uppercase;}
header h1 span{color:var(--amber);}
/* das Warnband, schwarz gelbe Schraegstreifen, unser Erkennungszeichen */
.warnband{height:8px; border-radius:4px; margin-top:8px; background:
  repeating-linear-gradient(-45deg, var(--amber) 0 12px, #14171B 12px 24px);
  opacity:.35;}
.warnband .fuell{height:100%; border-radius:4px; background:
  repeating-linear-gradient(-45deg, var(--amber) 0 12px, #1a1300 12px 24px);
  width:0%; transition:width .3s;}
header .warnband{opacity:1; background:#20262d; overflow:hidden;}
.fortschritt-text{font-size:12px; color:var(--schrift2); margin-top:4px; display:none;}

main{padding:16px; max-width:720px; margin:0 auto;}

/* ============ Allgemeine Bausteine ============ */
.karte-box{background:var(--flaeche); border:1px solid var(--linie); border-radius:14px;
  padding:16px; margin-bottom:14px;}
.eyebrow{font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--schrift2); margin-bottom:8px;}
h2{font-family:'Barlow Semi Condensed',sans-serif; font-size:22px; margin:0 0 12px 0;
  font-weight:700; letter-spacing:.3px;}
label{display:block; font-size:13px; color:var(--schrift2); margin:12px 0 5px 0; font-weight:500;}
input[type=text], input[type=date], textarea, select{
  width:100%; background:var(--flaeche2); border:1px solid var(--linie); border-radius:10px;
  color:var(--schrift); padding:13px 14px; font-size:16px; font-family:inherit; outline:none;}
input:focus, textarea:focus, select:focus{border-color:var(--amber);}
textarea{resize:vertical; min-height:52px;}
button{font-family:inherit; cursor:pointer; border:none; font-size:16px;}
button:focus-visible{outline:2px solid var(--amber); outline-offset:2px;}

.btn{display:block; width:100%; padding:16px; border-radius:12px; font-weight:600;
  background:var(--flaeche2); color:var(--schrift); border:1px solid var(--linie); margin-top:12px;}
.btn-amber{background:var(--amber); color:#14171B; border:none;}
.btn-amber:active{background:#e69c10;}
.btn-leise{background:transparent; border:1px solid var(--linie); color:var(--schrift2);}
.btn-rot{background:transparent; border:1px solid var(--nein); color:var(--nein);}
.btn-reihe{display:flex; gap:10px;}
.btn-reihe .btn{margin-top:12px;}

/* ============ Untere Navigation ============ */
nav{position:fixed; bottom:0; left:0; right:0; z-index:900; display:flex;
  background:#181C21; border-top:1px solid var(--linie);
  padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1; background:none; color:var(--schrift2); padding:12px 4px 10px 4px;
  font-size:12px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px;}
nav button svg{width:24px; height:24px; stroke:currentColor;}
nav button.aktiv{color:var(--amber);}

/* ============ Startseite ============ */
.gross-knopf{width:100%; padding:20px; border-radius:14px; background:var(--amber);
  color:#14171B; font-family:'Barlow Semi Condensed',sans-serif; font-size:20px; font-weight:700;
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:14px;
  box-shadow:0 4px 24px rgba(255,176,32,.25);}
.statistik{display:flex; gap:10px; margin-bottom:14px;}
.statistik .karte-box{flex:1; margin:0; padding:12px 14px;}
.statistik .zahl{font-family:'Barlow Semi Condensed',sans-serif; font-size:30px; font-weight:700;
  font-variant-numeric:tabular-nums;}
.statistik .zahl.rot{color:var(--nein);}
.statistik .klein{font-size:12px; color:var(--schrift2);}
#startKarte, #pickKarte, #ansichtKarte{height:280px; border-radius:12px; border:1px solid var(--linie);
  background:#20262d; z-index:1;}
#pickKarte{height:240px;}
#ansichtKarte{height:200px;}
/* dunkle Kartenkacheln, ein einfacher Filtertrick */
.leaflet-tile{filter:brightness(.7) invert(1) contrast(2.6) hue-rotate(195deg) saturate(.35) brightness(.72);}
.leaflet-container{background:#20262d; font-family:'Barlow',sans-serif;}
.leaflet-popup-content-wrapper, .leaflet-popup-tip{background:var(--flaeche); color:var(--schrift);}
.leaflet-popup-content a{color:var(--amber);}

/* ============ Standort Auswahl, drei Wege ============ */
.tab-reihe{display:flex; gap:8px; margin-top:12px;}
.tab-reihe button{flex:1; padding:11px 6px; border-radius:10px; background:var(--flaeche2);
  border:1px solid var(--linie); color:var(--schrift2); font-weight:600; font-size:14px;}
.tab-reihe button.aktiv{border-color:var(--amber); color:var(--amber); background:#2a2415;}
.gps-anzeige{font-size:14px; color:var(--schrift2); margin-top:10px;
  font-variant-numeric:tabular-nums;}
.gps-anzeige b{color:var(--schrift);}

/* ============ Suchliste Projektkennung ============ */
.suchliste{border:1px solid var(--linie); border-radius:10px; margin-top:6px;
  max-height:200px; overflow-y:auto; background:var(--flaeche2); display:none;}
.suchliste div{padding:12px 14px; border-bottom:1px solid var(--linie); font-size:15px;}
.suchliste div:last-child{border-bottom:none;}
.suchliste div:active{background:#2a2415;}

/* ============ Fragenkatalog ============ */
.kat-kopf{display:flex; align-items:center; gap:10px; margin:22px 0 10px 0;}
.kat-kopf .balken{width:5px; height:24px; border-radius:3px;}
.kat-kopf h3{margin:0; font-family:'Barlow Semi Condensed',sans-serif; font-size:17px;
  font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
.frage-karte{background:var(--flaeche); border:1px solid var(--linie); border-radius:14px;
  padding:14px; margin-bottom:12px;}
.frage-kopf{display:flex; gap:10px; align-items:flex-start;}
.frage-nr{font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:15px;
  color:var(--schrift2); min-width:26px; padding-top:1px; font-variant-numeric:tabular-nums;}
.frage-text{flex:1; font-size:15px; line-height:1.45;}
.sicher-marke{display:inline-block; font-size:10px; font-weight:700; letter-spacing:.8px;
  color:var(--sicher); border:1px solid var(--sicher); border-radius:5px; padding:2px 6px;
  margin-top:6px; text-transform:uppercase;}
.janein{display:flex; gap:8px; margin-top:12px;}
.janein button{flex:1; padding:12px 4px; border-radius:11px; font-weight:700; font-size:14px;
  line-height:1.25; background:var(--flaeche2); border:1.5px solid var(--linie); color:var(--schrift2);
  font-family:'Barlow Semi Condensed',sans-serif; letter-spacing:.3px;}
.janein button.ja-aktiv{background:#12291a; border-color:var(--ja); color:var(--ja);}
.janein button.nein-aktiv{background:#2b1416; border-color:var(--nein); color:var(--nein);}
.janein button.nb-aktiv{background:#2a2e33; border-color:var(--schrift2); color:var(--schrift2);}
.foto-reihe{display:flex; gap:10px; margin-top:10px;}
.foto-reihe button{flex:1; padding:11px; border-radius:10px; background:transparent;
  border:1px dashed var(--linie); color:var(--schrift2); font-size:14px; font-weight:500;}
.foto-vorschau{position:relative; margin-top:10px;}
.foto-vorschau img{width:100%; border-radius:10px; display:block; max-height:220px; object-fit:cover;}
.foto-vorschau button{position:absolute; top:8px; right:8px; background:rgba(0,0,0,.65);
  color:#fff; border-radius:8px; padding:6px 10px; font-size:13px;}
.frage-karte textarea{margin-top:10px; font-size:14px;}

/* ============ Auswertung ============ */
.status-karte{border-radius:14px; padding:18px; margin-bottom:14px; border:1.5px solid;}
.status-karte .titel{font-family:'Barlow Semi Condensed',sans-serif; font-size:21px;
  font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
.status-karte .unter{font-size:14px; margin-top:4px; opacity:.85;}
.st-gruen{border-color:var(--ja); background:#12291a; color:var(--ja);}
.st-gelb{border-color:var(--amber); background:#2a2415; color:var(--amber);}
.st-rot{border-color:var(--nein); background:#2b1416; color:var(--nein);}
.st-grau{border-color:var(--linie); background:var(--flaeche); color:var(--schrift2);}
.aus-tabelle{width:100%; border-collapse:collapse; font-size:14px;}
.aus-tabelle td{padding:9px 4px; border-bottom:1px solid var(--linie);}
.aus-tabelle td:last-child{text-align:right; font-variant-numeric:tabular-nums; font-weight:600;}
.aus-tabelle tr:last-child td{border-bottom:none;}

/* ============ Logbuch ============ */
.log-karte{background:var(--flaeche); border:1px solid var(--linie); border-radius:14px;
  padding:14px; margin-bottom:12px; display:flex; gap:12px; align-items:center; width:100%;
  text-align:left; color:var(--schrift);}
.log-punkt{width:12px; height:12px; border-radius:50%; flex-shrink:0;}
.log-info{flex:1;}
.log-info .k{font-weight:700; font-size:16px; font-family:'Barlow Semi Condensed',sans-serif;}

<script>
/* =====================================================
   Baustellen Check App, Glasfaserbaustellen
   Alles in einer Datei, Kommentare bewusst einfach gehalten

// ---------- der feste Fragenkatalog, 25 Fragen ----------
// sicher bedeutet, die Frage ist sicherheitsrelevant,
// ein Nein macht den ganzen Besuch sofort kritisch
const KATEGORIEN = [

const FRAGEN = [
  {nr:1,  kat:0, sicher:true,  text:'Wird die vorgeschriebene persönliche Schutzausrüstung von allen Mitarbeitern getragen'},

  {nr:6,  kat:0, sicher:true,  text:'Ist die Lagerung von Gefahrstoffen und Material ordnungsgemäß'},
  {nr:7,  kat:0, sicher:true,  text:'Sind Fluchtwege und Zugänge frei zugänglich'},

  {nr:24, kat:3, sicher:false, text:'Wird Aushub und Abfall ordnungsgemäß entsorgt'},

// leise Meldung unten am Bildschirm, statt alert, das kann in mancher Vorschau blockiert sein
function meldung(text, dauer=3500){
  let el = document.getElementById('meldungBox');
  if(!el){
    el = document.createElement('div');
    el.id = 'meldungBox';
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.classList.add('zeigen');
  clearTimeout(meldung._t);
  meldung._t = setTimeout(()=>{ if(el) el.classList.remove('zeigen'); }, dauer);
}

// ---------- Speicher, jetzt über IndexedDB direkt im Safari auf dem iPhone ----------
// Läuft komplett lokal auf diesem einen Gerät, kein Internet noetig, dauerhaft
// gespeichert bis die App aus den Einstellungen geloescht wird. Weil es lokal ist,
// sieht ein zweites Geraet diese Daten nicht automatisch mit, dafuer braeuchte es
// spaeter einen echten Server im Hintergrund.
const MERKER = {}; // Notloesung, falls IndexedDB ausnahmsweise nicht verfuegbar ist
function merkerListe(prefix){ return Object.keys(MERKER).filter(k=>k.startsWith(prefix)); }

const DB_NAME = 'baustellenCheckDB', STORE_NAME = 'kv';
let dbPromise = null;
function dbOeffnen(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject)=>{
    if(!window.indexedDB){ reject(new Error('IndexedDB nicht verfuegbar')); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{ if(!req.result.objectStoreNames.contains(STORE_NAME)) req.result.createObjectStore(STORE_NAME); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return dbPromise;
}
async function speicherHolen(schluessel){
  try{
    const db = await dbOeffnen();
    return await new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_NAME,'readonly');
      const req = tx.objectStore(STORE_NAME).get(schluessel);
      req.onsuccess = ()=>resolve(req.result===undefined ? null : req.result);
      req.onerror = ()=>reject(req.error);
    });
  }catch(e){ return MERKER[schluessel] !== undefined ? MERKER[schluessel] : null; }
}
async function speicherSetzen(schluessel, wert){
  MERKER[schluessel] = wert;
  try{
    const db = await dbOeffnen();
    await new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_NAME,'readwrite');
      tx.objectStore(STORE_NAME).put(wert, schluessel);
      tx.oncomplete = resolve;
      tx.onerror = ()=>reject(tx.error);
    });
  }catch(e){ console.error('Speichern ging schief', e); }
}
async function speicherLoeschen(schluessel){
  delete MERKER[schluessel];
  try{
    const db = await dbOeffnen();
    await new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_NAME,'readwrite');
      tx.objectStore(STORE_NAME).delete(schluessel);
      tx.oncomplete = resolve;
      tx.onerror = ()=>reject(tx.error);
    });
  }catch(e){ console.error('Loeschen ging schief', e); }
}
async function speicherListe(prefix){
  try{
    const db = await dbOeffnen();
    return await new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_NAME,'readonly');
      const req = tx.objectStore(STORE_NAME).getAllKeys();
      req.onsuccess = ()=>resolve(req.result.map(String).filter(k=>k.startsWith(prefix)));
      req.onerror = ()=>reject(req.error);
    });
  }catch(e){ return merkerListe(prefix); }
}

// ---------- der aktuelle Zustand der App ----------
let stammdaten = {kennungen:[], firmen:[]};
let logIndex = [];        // kurze Uebersicht aller gespeicherten Besuche
let besuch = null;        // der Besuch an dem gerade gearbeitet wird
let aktuelleFotoFrage = null; // fuer welche Frage gerade ein Foto geholt wird
let standortTab = 'adresse';  // welcher Weg der Standorterfassung gerade offen ist
let startKarte = null, pickKarte = null, ansichtKarte = null, pickMarker = null;
let aktuellerScreen = 'start';
let ansichtBesuch = null; // der Besuch der gerade nur angeschaut wird

// ---------- Hilfen ----------
function esc(t){ return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function heute(){ return new Date().toISOString().slice(0,10); }
function datumSchoen(iso){ if(!iso) return ''; const [j,m,t]=iso.split('-'); return `${t}.${m}.${j}`; }
function neueId(){ return 'b' + Date.now() + Math.floor(Math.random()*1000); }

function leererBesuch(){
  return { id:neueId(), kennung:'', firma:'', pruefer:'', datum:heute(), revision:1,
    strasse:'', ort:'', lat:null, lng:null, antworten:{}, gespeichertAm:null };
}

// rechnet den Status eines Besuchs aus, gleiche Logik wie in der Exceltabelle
function statusRechnen(b){
  let ja=0, nein=0, nb=0, kritisch=0;
  for(const f of FRAGEN){
    const a = b.antworten[f.nr];
    if(!a || !a.wert) continue;
    if(a.wert==='ja') ja++;
    else if(a.wert==='nein'){ nein++; if(f.sicher) kritisch++; }
    else if(a.wert==='nb') nb++;
  }
  const beantwortet = ja+nein+nb;
  let status, klasse;
  if(kritisch>0){ status='Kritisch, sofortige Maßnahme erforderlich'; klasse='rot'; }
  else if(beantwortet===0){ status='Keine Daten vorhanden'; klasse='grau'; }
  else if(beantwortet<FRAGEN.length){ status='In Bearbeitung'; klasse='grau'; }
  else if(nein>0){ status='Mängel vorhanden, Nacharbeit erforderlich'; klasse='gelb'; }
  else { status='Bestanden'; klasse='gruen'; }
  return {ja, nein, nb, kritisch, beantwortet, status, klasse};
}
function statusFarbe(klasse){
  return klasse==='rot' ? '#E5484D' : klasse==='gelb' ? '#FFB020' : klasse==='gruen' ? '#3FB966' : '#93A0AD';
}

// ---------- Start der App ----------
async function appStart(){
  const sd = await speicherHolen('stammdaten', true);
  if(sd){ stammdaten = sd; }
  else{
    // ein paar Beispielwerte damit man direkt testen kann
    stammdaten = {
      kennungen:['P0001 Musterstadt Nord','P0002 Musterstadt Süd','P0003 Beispielhausen'],
      firmen:['Firma A','Firma B','Firma C','Sonstige']
    };
    await speicherSetzen('stammdaten', stammdaten, true);
  }
  await indexAlleLaden();
  zeige('start');
}

// baut die Kurzuebersicht aller Besuche aus lauter kleinen Einzelschluesseln neu auf
async function indexAlleLaden(){
  const schluessel = await speicherListe('index:', true);
  const eintraege = [];
  for(const k of schluessel){
    const w = await speicherHolen(k, true);
    if(w) eintraege.push(w);
  }
  eintraege.sort((a,b)=> (b.datum||'').localeCompare(a.datum||''));
  logIndex = eintraege;
}

// ---------- Bildschirm wechseln ----------
function zeige(screen){
  aktuellerScreen = screen;
  ['navStart','navLogbuch','navAuswertungen','navStamm'].forEach(id=>document.getElementById(id).classList.remove('aktiv'));
  if(screen==='start') document.getElementById('navStart').classList.add('aktiv');
  if(screen==='logbuch') document.getElementById('navLogbuch').classList.add('aktiv');
  if(screen==='auswertungen') document.getElementById('navAuswertungen').classList.add('aktiv');
  if(screen==='stammdaten') document.getElementById('navStamm').classList.add('aktiv');
  fortschrittZeigen(false);
  if(screen==='start') zeichneStart();
  if(screen==='logbuch') zeichneLogbuch();
  if(screen==='auswertungen') zeichneAuswertungen();
  if(screen==='stammdaten') zeichneStammdaten();
  if(screen==='projekt') zeichneProjekt();
  if(screen==='fragen') zeichneFragen();
  if(screen==='abschluss') zeichneAbschluss();
  if(screen==='ansicht') zeichneAnsicht();
  window.scrollTo(0,0);
}

function fortschrittZeigen(an){
  document.getElementById('warnband').style.display = an ? 'block' : 'none';
  document.getElementById('fortschrittText').style.display = an ? 'block' : 'none';
}
function fortschrittAktualisieren(){
  if(!besuch) return;
  const s = statusRechnen(besuch);
  const prozent = Math.round(s.beantwortet / FRAGEN.length * 100);
  document.getElementById('warnbandFuell').style.width = prozent + '%';
  document.getElementById('fortschrittText').textContent =
    s.beantwortet + ' von ' + FRAGEN.length + ' Fragen beantwortet';
}

/* =====================================================
   Startseite, Karte mit allen Besuchen als Punkte
   ===================================================== */
function zeichneStart(){
  const kritische = logIndex.filter(e=>e.klasse==='rot').length;
  document.getElementById('app').innerHTML = `
    <button class="gross-knopf" onclick="neuerBesuch()">+ Neuer Baustellenbesuch</button>
    <div class="statistik">
      <div class="karte-box"><div class="zahl">${logIndex.length}</div><div class="klein">Besuche gesamt</div></div>
      <div class="karte-box"><div class="zahl rot">${kritische}</div><div class="klein">davon kritisch</div></div>
    </div>
    <div class="karte-box">
      <div class="eyebrow">Übersichtskarte</div>
      <div id="startKarte"></div>
      <div class="hinweis">Jeder gespeicherte Baustellenbesuch mit Standort erscheint hier als Punkt, Farbe zeigt den Status</div>
    </div>`;
  // Karte erst bauen wenn das Element auch da ist
  setTimeout(startKarteBauen, 50);
}

function startKarteBauen(){
  const el = document.getElementById('startKarte');
  if(!el) return;
  if(typeof L==='undefined'){
    el.innerHTML = '<div style="padding:16px;font-size:13px;line-height:1.55;color:var(--schrift2)">Die Kartenbibliothek konnte nicht geladen werden. Das passiert meist ohne Internetverbindung oder wenn die Seite außerhalb eines echten Browsers geöffnet wurde. Bitte im Browser mit Internetverbindung erneut versuchen.</div>';
    return;
  }
  startKarte = L.map('startKarte');
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap'}).addTo(startKarte);
  const mitOrt = logIndex.filter(e=>e.lat && e.lng);
  if(mitOrt.length){
    const gruppe = [];
    mitOrt.forEach(e=>{
      const m = L.circleMarker([e.lat, e.lng], {radius:9, color:statusFarbe(e.klasse),
        fillColor:statusFarbe(e.klasse), fillOpacity:.85, weight:2}).addTo(startKarte);
      m.bindPopup(`<b>${esc(e.kennung)}</b><br>${esc(e.firma)}<br>${datumSchoen(e.datum)}, V${e.revision}<br>` +
        `<a href="#" onclick="eintragOeffnen('${e.id}');return false;">Eintrag öffnen</a>`);
      gruppe.push([e.lat, e.lng]);
    });
    startKarte.fitBounds(gruppe, {padding:[30,30], maxZoom:15});
  } else {
    startKarte.setView([51.388, 8.141], 13); // Zum Dümpel, 59823 Arnsberg, als Ausgangspunkt
  }
  setTimeout(()=>startKarte.invalidateSize(), 200);
}

/* =====================================================
   Schritt 1, Projektdaten und Standort
   ===================================================== */
function neuerBesuch(){ besuch = leererBesuch(); standortTab='adresse'; zeige('projekt'); }

function zeichneProjekt(){
  const b = besuch;
  document.getElementById('app').innerHTML = `

    <div class="karte-box">
      <div class="eyebrow">Projekt</div>
      <label>Projektkennung, tippen zum Suchen</label>
      <input type="text" id="kennungSuche" value="${esc(b.kennung)}" placeholder="Suchen oder auswählen"
        oninput="kennungFiltern()" onfocus="kennungFiltern()" autocomplete="off">
      <div class="suchliste" id="kennungListe"></div>
      <label>Tiefbaufirma</label>
      <select id="firmaWahl" onchange="besuch.firma=this.value">
        <option value="">Bitte wählen</option>
        ${stammdaten.firmen.map(f=>`<option ${b.firma===f?'selected':''}>${esc(f)}</option>`).join('')}
      </select>
      <label>Prüfer</label>
      <input type="text" id="prueferFeld" value="${esc(b.pruefer)}" placeholder="Name des Prüfers"
        oninput="besuch.pruefer=this.value">
      <label>Datum</label>
      <input type="date" value="${b.datum}" onchange="besuch.datum=this.value">
    </div>

    <div class="karte-box">
      <div class="eyebrow">Standort</div>
      <div class="tab-reihe">
        <button id="tabAdresse" onclick="standortWechsel('adresse')">Adresse</button>
        <button id="tabGps" onclick="standortWechsel('gps')">GPS</button>
        <button id="tabKarte" onclick="standortWechsel('karte')">Karte</button>
      </div>
      <div id="panelAdresse">
        <label>Straße und Hausnummer</label>
        <input type="text" value="${esc(b.strasse)}" placeholder="z.B. Hauptstraße 12" oninput="besuch.strasse=this.value">
        <label>Postleitzahl und Ort</label>
        <input type="text" value="${esc(b.ort)}" placeholder="z.B. 12345 Musterstadt" oninput="besuch.ort=this.value">
      </div>
      <div id="panelGps" class="versteckt">
        <button class="btn btn-amber" onclick="gpsHolen()">Standort jetzt ermitteln</button>
        <div class="gps-anzeige" id="gpsAnzeige"></div>
      </div>
      <div id="panelKarte" class="versteckt">
        <div class="hinweis" style="margin:10px 0">Auf die Karte tippen um den Standort zu setzen</div>
        <div id="pickKarte"></div>
      </div>
      <div class="gps-anzeige" id="koordAnzeige"></div>
    </div>

    <div class="btn-reihe">
      <button class="btn btn-leise" onclick="zeige('start')">Abbrechen</button>
      <button class="btn btn-amber" onclick="weiterZuFragen()">Weiter zu den Fragen</button>
    </div>`;
  standortWechsel(standortTab);
  koordAnzeigen();
}

function kennungFiltern(){
  const feld = document.getElementById('kennungSuche');
  const liste = document.getElementById('kennungListe');
  const suche = feld.value.toLowerCase();
  const treffer = stammdaten.kennungen.filter(k=>k.toLowerCase().includes(suche));
  besuch.kennung = feld.value; // freie Eingabe geht auch
  if(!treffer.length){ liste.style.display='none'; return; }
  liste.innerHTML = treffer.map(k=>`<div onclick="kennungWaehlen('${esc(k).replace(/'/g,"\\'")}')">${esc(k)}</div>`).join('');
  liste.style.display='block';
}

function standortWechsel(tab){
  standortTab = tab;
  ['adresse','gps','karte'].forEach(t=>{
    document.getElementById('tab'+t[0].toUpperCase()+t.slice(1)).classList.toggle('aktiv', t===tab);
    document.getElementById('panel'+t[0].toUpperCase()+t.slice(1)).classList.toggle('versteckt', t!==tab);
  });
  if(tab==='karte') setTimeout(pickKarteBauen, 60);
}

function pickKarteBauen(){
  const el = document.getElementById('pickKarte');
  if(!el) return;
  if(typeof L==='undefined'){
    el.innerHTML = '<div style="padding:16px;font-size:13px;line-height:1.55;color:var(--schrift2)">Die Kartenbibliothek konnte nicht geladen werden, bitte Adresse oder GPS Erkennung nutzen, oder im Browser mit Internetverbindung erneut versuchen.</div>';
    return;
  }
  if(pickKarte){ pickKarte.remove(); pickKarte=null; }
  pickKarte = L.map('pickKarte');
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(pickKarte);
  if(besuch.lat && besuch.lng){
    pickKarte.setView([besuch.lat, besuch.lng], 16);
    pickMarker = L.marker([besuch.lat, besuch.lng]).addTo(pickKarte);
  } else {
    pickKarte.setView([51.388, 8.141], 13); // Zum Dümpel, 59823 Arnsberg, als Ausgangspunkt
  }
  // Tipp auf die Karte setzt den Punkt
  pickKarte.on('click', e=>{
    besuch.lat = Math.round(e.latlng.lat*1e6)/1e6;
    besuch.lng = Math.round(e.latlng.lng*1e6)/1e6;
    if(pickMarker) pickMarker.setLatLng(e.latlng); else pickMarker = L.marker(e.latlng).addTo(pickKarte);
    koordAnzeigen();
  });
  setTimeout(()=>pickKarte.invalidateSize(), 200);
}

function gpsHolen(){
  const anzeige = document.getElementById('gpsAnzeige');
  if(!navigator.geolocation){ anzeige.textContent='Standorterkennung wird auf diesem Gerät nicht unterstützt'; return; }
  anzeige.textContent = 'Standort wird ermittelt ...';
  navigator.geolocation.getCurrentPosition(pos=>{
    besuch.lat = Math.round(pos.coords.latitude*1e6)/1e6;
    besuch.lng = Math.round(pos.coords.longitude*1e6)/1e6;
    anzeige.innerHTML = 'Standort übernommen, Genauigkeit etwa <b>' + Math.round(pos.coords.accuracy) + ' m</b>';
    koordAnzeigen();
  }, err=>{
    // je nach Fehlercode eine passende, verständliche Meldung zeigen
    if(err.code === 1){
      anzeige.textContent = 'Standort wurde nicht freigegeben, bitte in den iPhone Einstellungen unter Safari, Standort, die Freigabe erteilen';
    } else if(err.code === 2){
      anzeige.textContent = 'Standort aktuell nicht bestimmbar, bitte kurz warten oder ins Freie gehen und erneut versuchen';
    } else if(err.code === 3){
      anzeige.textContent = 'Standortermittlung hat zu lange gedauert, bitte erneut versuchen';
    } else {
      anzeige.textContent = 'Standort konnte nicht ermittelt werden, bitte Karte oder Adresse nutzen';
    }
  }, {enableHighAccuracy:true, timeout:12000});
}

function koordAnzeigen(){
  const el = document.getElementById('koordAnzeige');
  if(!el) return;
  el.innerHTML = (besuch.lat && besuch.lng)

function antwortHolen(nr){
  if(!besuch.antworten[nr]) besuch.antworten[nr] = {wert:null, kommentar:'', foto:null};
  return besuch.antworten[nr];
}
function bewerten(nr, wert){
  const a = antwortHolen(nr);
  a.wert = (a.wert===wert) ? null : wert; // nochmal tippen nimmt die Bewertung zurueck
  frageNeuZeichnen(nr);
  fortschrittAktualisieren();
}
function kommentarSetzen(nr, text){ antwortHolen(nr).kommentar = text; }

// ---------- Fotos, aus Kamera oder Galerie ----------
function fotoAnfordern(nr, quelle){
  aktuelleFotoFrage = nr;
  document.getElementById(quelle==='kamera' ? 'fotoKamera' : 'fotoGalerie').click();
}
function fotoEntfernen(nr){ antwortHolen(nr).foto = null; frageNeuZeichnen(nr); }

// das Bild wird verkleinert damit der Speicher nicht platzt
function fotoVerarbeiten(datei){
  if(!datei || aktuelleFotoFrage===null) return;
  const leser = new FileReader();
  leser.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const max = 900;
      let w = img.width, h = img.height;
      if(w>h && w>max){ h = h*max/w; w = max; }
      else if(h>=w && h>max){ w = w*max/h; h = max; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      antwortHolen(aktuelleFotoFrage).foto = c.toDataURL('image/jpeg', .72);
      frageNeuZeichnen(aktuelleFotoFrage);
      aktuelleFotoFrage = null;
    };
    img.src = ev.target.result;
  };
  leser.readAsDataURL(datei);
}
document.getElementById('fotoKamera').addEventListener('change', e=>{ fotoVerarbeiten(e.target.files[0]); e.target.value=''; });
document.getElementById('fotoGalerie').addEventListener('change', e=>{ fotoVerarbeiten(e.target.files[0]); e.target.value=''; });

async function besuchSpeichern(){
  const s = statusRechnen(besuch);

  // kompletten Besuch dauerhaft auf dem Geraet speichern
  await speicherSetzen('besuch:'+besuch.id, besuch, true);
  // die Kurzinfo bekommt einen eigenen kleinen Schluessel statt einer gemeinsamen Liste
  const meta = {id:besuch.id, kennung:besuch.kennung, firma:besuch.firma, pruefer:besuch.pruefer,
    datum:besuch.datum, revision:besuch.revision, klasse:s.klasse, status:s.status,
    lat:besuch.lat, lng:besuch.lng};

  await indexAlleLaden();
  meldung('Besuch wurde als Logeintrag gespeichert, Revisionsstand V'+besuch.revision);

/* =====================================================
   Auswertungen, gefilterte Übersicht über alle Besuche
   ===================================================== */
let ausFilter = {kennung:'', firma:'', pruefer:'', status:'', von:'', bis:''};

function zeichneAuswertungen(){
  const kennungen = [...new Set(logIndex.map(e=>e.kennung).filter(Boolean))].sort();
  const pruefer = [...new Set(logIndex.map(e=>e.pruefer).filter(Boolean))].sort();
  const statusListe = ['Bestanden','Mängel vorhanden, Nacharbeit erforderlich',
    'Kritisch, sofortige Maßnahme erforderlich','In Bearbeitung'];

  const gefiltert = logIndex.filter(e=>{
    if(ausFilter.kennung && e.kennung!==ausFilter.kennung) return false;
    if(ausFilter.firma && e.firma!==ausFilter.firma) return false;
    if(ausFilter.pruefer && e.pruefer!==ausFilter.pruefer) return false;
    if(ausFilter.status && e.status!==ausFilter.status) return false;
    if(ausFilter.von && e.datum < ausFilter.von) return false;
    if(ausFilter.bis && e.datum > ausFilter.bis) return false;
    return true;
  });
  const kritisch = gefiltert.filter(e=>e.klasse==='rot').length;
  const bestanden = gefiltert.filter(e=>e.klasse==='gruen').length;

  document.getElementById('app').innerHTML = `
    <h2>Auswertungen</h2>
    <div class="karte-box">
      <div class="eyebrow">Filter</div>
      <div class="filter-box">
        <div><label>Projektkennung</label>
          <select onchange="ausFilter.kennung=this.value; zeichneAuswertungen()">
            <option value="">Alle</option>
            ${kennungen.map(k=>`<option ${ausFilter.kennung===k?'selected':''}>${esc(k)}</option>`).join('')}
          </select></div>
        <div><label>Tiefbaufirma</label>
          <select onchange="ausFilter.firma=this.value; zeichneAuswertungen()">
            <option value="">Alle</option>
            ${stammdaten.firmen.map(f=>`<option ${ausFilter.firma===f?'selected':''}>${esc(f)}</option>`).join('')}
          </select></div>
        <div><label>Prüfer</label>
          <select onchange="ausFilter.pruefer=this.value; zeichneAuswertungen()">
            <option value="">Alle</option>
            ${pruefer.map(p=>`<option ${ausFilter.pruefer===p?'selected':''}>${esc(p)}</option>`).join('')}
          </select></div>
        <div><label>Status</label>
          <select onchange="ausFilter.status=this.value; zeichneAuswertungen()">
            <option value="">Alle</option>
            ${statusListe.map(s=>`<option value="${esc(s)}" ${ausFilter.status===s?'selected':''}>${esc(s)}</option>`).join('')}
          </select></div>
        <div><label>Von</label>
          <input type="date" value="${ausFilter.von}" onchange="ausFilter.von=this.value; zeichneAuswertungen()"></div>
        <div><label>Bis</label>
          <input type="date" value="${ausFilter.bis}" onchange="ausFilter.bis=this.value; zeichneAuswertungen()"></div>
      </div>
      <button class="btn btn-leise" onclick="ausFilterZuruecksetzen()">Filter zurücksetzen</button>
    </div>
    <div class="stat-reihe">
      <div class="karte-box"><div class="zahl">${gefiltert.length}</div><div class="klein">Treffer</div></div>
      <div class="karte-box"><div class="zahl" style="color:var(--ja)">${bestanden}</div><div class="klein">bestanden</div></div>
      <div class="karte-box"><div class="zahl rot">${kritisch}</div><div class="klein">kritisch</div></div>
    </div>
    ${gefiltert.length ? gefiltert.map(e=>`
      <button class="log-karte" onclick="eintragOeffnen('${e.id}')">
        <div class="log-punkt" style="background:${statusFarbe(e.klasse)}"></div>
        <div class="log-info">
          <div class="k">${esc(e.kennung)}</div>
          <div class="d">${esc(e.firma||'ohne Firma')}, ${esc(e.pruefer||'ohne Prüfer')}, ${datumSchoen(e.datum)}</div>
        </div>
        <div class="log-rev">V${e.revision}</div>
      </button>`).join('') : '<div class="leer-hinweis">Kein Besuch passt zu diesen Filtern</div>'}`;
}
function ausFilterZuruecksetzen(){
  ausFilter = {kennung:'', firma:'', pruefer:'', status:'', von:'', bis:''};
  zeichneAuswertungen();
}

  const btn = document.getElementById('loeschKnopf');

    eintragLoeschen();

      <div class="stamm-neu">
        <input type="text" id="neuFirma" placeholder="Neue Tiefbaufirma">
        <button onclick="stammNeu('firmen','neuFirma')">+</button>
      </div>
    </div>`;
}
async function stammNeu(liste, feldId){
  const feld = document.getElementById(feldId);
  const wert = feld.value.trim();
  if(!wert) return;
  stammdaten[liste].push(wert);
  await speicherSetzen('stammdaten', stammdaten, true);
  zeichneStammdaten();
}
// erst antippen bestaetigt, zweites Tippen auf denselben Knopf loescht wirklich
let stammLoeschPending = null;
function stammLoeschenAnfragen(liste, i){
  const key = liste+':'+i;
  if(stammLoeschPending === key){
    stammLoeschPending = null;
    stammLoeschenAusfuehren(liste, i);
  } else {
    stammLoeschPending = key;
    zeichneStammdaten();
    setTimeout(()=>{ if(stammLoeschPending===key){ stammLoeschPending=null; zeichneStammdaten(); } }, 4000);
  }
}
async function stammLoeschenAusfuehren(liste, i){
  stammdaten[liste].splice(i,1);
  await speicherSetzen('stammdaten', stammdaten, true);
  zeichneStammdaten();
}

/* =====================================================
   Bericht als PDF, über die Druckfunktion des Browsers,
   das braucht keine externe Bibliothek und funktioniert
   auch ohne Internetverbindung
   ===================================================== */
function berichtDrucken(b){
  if(!b){ meldung('Kein Besuch zum Drucken vorhanden'); return; }
  let bereich = document.getElementById('druckBereich');
  if(!bereich){
    bereich = document.createElement('div');
    bereich.id = 'druckBereich';
    document.body.appendChild(bereich);
  }
  bereich.innerHTML = druckInhaltBauen(b);
  document.title = 'Pruefprotokoll_' + (b.kennung||'Projekt').replace(/[^\wäöüÄÖÜß]+/g,'_') + '_V' + b.revision;
  setTimeout(()=>window.print(), 80);
}
function druckInhaltBauen(b){
  const s = statusRechnen(b);
  let html = `<div class="druck-kopf">Baustellen Check, Prüfprotokoll Glasfaser</div>
    <table class="druck-info">
      <tr><td>Projektkennung</td><td>${esc(b.kennung)}</td></tr>
      <tr><td>Tiefbaufirma</td><td>${esc(b.firma||'–')}</td></tr>
      <tr><td>Prüfer</td><td>${esc(b.pruefer||'–')}</td></tr>
      <tr><td>Datum</td><td>${datumSchoen(b.datum)}</td></tr>
      <tr><td>Revisionsstand</td><td>V${b.revision}</td></tr>
      ${(b.strasse||b.ort) ? `<tr><td>Adresse</td><td>${esc([b.strasse,b.ort].filter(Boolean).join(', '))}</td></tr>` : ''}
      ${(b.lat && b.lng) ? `<tr><td>GPS Koordinaten</td><td>${b.lat}, ${b.lng}</td></tr>` : ''}
    </table>
    <div class="druck-status">${esc(s.status)}<br>
      <span style="font-weight:400">${s.beantwortet} von ${FRAGEN.length} Fragen beantwortet, ${s.ja} mal Ja, ${s.nein} mal Nein, ${s.nb} mal nicht bewertbar</span>
    </div>`;
  KATEGORIEN.forEach((kat, ki)=>{
    html += `<div class="druck-kategorie">${esc(kat.name)}</div>`;
    FRAGEN.filter(f=>f.kat===ki).forEach(f=>{
      const a = b.antworten[f.nr] || {};
      const wertKlasse = a.wert==='ja' ? 'druck-wert-ja' : a.wert==='nein' ? 'druck-wert-nein' : 'druck-wert-nb';
      const wertText = a.wert==='ja' ? 'JA' : a.wert==='nein' ? 'NEIN' : a.wert==='nb' ? 'NICHT BEWERTBAR' : 'OFFEN';
      html += `<div class="druck-frage">
        <div>${f.nr}. ${esc(f.text)}${f.sicher ? ' (sicherheitsrelevant)' : ''}
          <span class="${wertKlasse}"> — ${wertText}</span></div>
        ${a.kommentar ? `<div class="druck-kommentar">Kommentar, ${esc(a.kommentar)}</div>` : ''}
        ${a.foto ? `<img class="druck-foto" src="${a.foto}">` : ''}
      </div>`;
    });
  });
  return html;
}
