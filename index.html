<title>// Baustellen QS + Mängelerfassung</title>
<!-- Tailwind nur fuer neu gebaute Bereiche wie die Mängelauswertung, das bestehende
     dunkle Design bleibt bei den eigenen Klassen weiter unten in dieser Datei -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============ Grundfarben, dunkles Design ============ */
:root{
  --grund:#14171B;        /* Asphalt, Hintergrund */
  --flaeche:#1C2127;      /* Karten und Paneele */
  --flaeche2:#242B33;     /* Eingabefelder */
  --linie:#2E3640;        /* feine Trennlinien */
  --schrift:#E9ECEF;      /* Haupttext */
  --schrift2:#93A0AD;     /* Nebentext */
  --amber:#FFB020;        /* Baustellenwarnfarbe, Hauptakzent */
  --amberdunkel:#8a5c00;
  --ja:#3FB966;           /* Bewertung Ja */
  --nein:#E5484D;         /* Bewertung Nein */
  --sicher:#FF8A3D;       /* Kennzeichen sicherheitsrelevant */
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--grund); color:var(--schrift);
  font-family:'Barlow',system-ui,sans-serif; font-size:16px;}
body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}

/* ============ Kopfzeile mit Warnband ============ */
header{position:sticky; top:0; z-index:900; background:var(--grund);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px 16px;
  border-bottom:1px solid var(--linie);}
header h1{margin:0; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700;
  font-size:20px; letter-spacing:.5px; text-transform:uppercase;}
header h1 span{color:var(--amber);}
.rev-tag{font-size:11px; color:var(--schrift2); margin-top:4px; font-variant-numeric:tabular-nums;}
/* das Warnband, schwarz gelbe Schraegstreifen, unser Erkennungszeichen */
.warnband{height:8px; border-radius:4px; margin-top:8px; background:
  repeating-linear-gradient(-45deg, var(--amber) 0 12px, #14171B 12px 24px);
  opacity:.35;}
.warnband .fuell{height:100%; border-radius:4px; background:
  repeating-linear-gradient(-45deg, var(--amber) 0 12px, #1a1300 12px 24px);
  width:0%; transition:width .3s;}
header .warnband{opacity:1; background:#20262d; overflow:hidden;}
.fortschritt-text{font-size:12px; color:var(--schrift2); margin-top:4px; display:none;}

main{padding:16px; max-width:720px; margin:0 auto;}

/* ============ Allgemeine Bausteine ============ */
.karte-box{background:var(--flaeche); border:1px solid var(--linie); border-radius:14px;
  padding:16px; margin-bottom:14px;}
.eyebrow{font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--schrift2); margin-bottom:8px;}
h2{font-family:'Barlow Semi Condensed',sans-serif; font-size:22px; margin:0 0 12px 0;
  font-weight:700; letter-spacing:.3px;}
label{display:block; font-size:13px; color:var(--schrift2); margin:12px 0 5px 0; font-weight:500;}
input[type=text], input[type=date], textarea, select{
  width:100%; background:var(--flaeche2); border:1px solid var(--linie); border-radius:10px;
  color:var(--schrift); padding:13px 14px; font-size:16px; font-family:inherit; outline:none;}
input:focus, textarea:focus, select:focus{border-color:var(--amber);}
textarea{resize:vertical; min-height:52px;}
button{font-family:inherit; cursor:pointer; border:none; font-size:16px;}
button:focus-visible{outline:2px solid var(--amber); outline-offset:2px;}

.btn{display:block; width:100%; padding:16px; border-radius:12px; font-weight:600;
  background:var(--flaeche2); color:var(--schrift); border:1px solid var(--linie); margin-top:12px;}
.btn-amber{background:var(--amber); color:#14171B; border:none;}
.btn-amber:active{background:#e69c10;}
.btn-leise{background:transparent; border:1px solid var(--linie); color:var(--schrift2);}
.btn-rot{background:transparent; border:1px solid var(--nein); color:var(--nein);}
.btn-reihe{display:flex; gap:10px;}
.btn-reihe .btn{margin-top:12px;}

/* ============ Untere Navigation ============ */
nav{position:fixed; bottom:0; left:0; right:0; z-index:900; display:flex;
  background:#181C21; border-top:1px solid var(--linie);
  padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1; background:none; color:var(--schrift2); padding:12px 4px 10px 4px;
  font-size:12px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px;}
nav button svg{width:24px; height:24px; stroke:currentColor;}
nav button.aktiv{color:var(--amber);}

/* ============ Startseite ============ */
.gross-knopf{width:100%; padding:20px; border-radius:14px; background:var(--amber);
  color:#14171B; font-family:'Barlow Semi Condensed',sans-serif; font-size:20px; font-weight:700;
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:14px;
  box-shadow:0 4px 24px rgba(255,176,32,.25);}
.statistik{display:flex; gap:10px; margin-bottom:14px;}
.statistik .karte-box{flex:1; margin:0; padding:12px 14px;}
.statistik .zahl{font-family:'Barlow Semi Condensed',sans-serif; font-size:30px; font-weight:700;
  font-variant-numeric:tabular-nums;}
.statistik .zahl.rot{color:var(--nein);}
.statistik .klein{font-size:12px; color:var(--schrift2);}
#startKarte, #pickKarte, #ansichtKarte{border-radius:12px; border:1px solid var(--linie);
  background:#20262d; z-index:1;}
#startKarte{height:62vh; min-height:440px;}
#pickKarte{height:240px;}
#ansichtKarte{height:200px;}
/* dunkle Kartenkacheln, ein einfacher Filtertrick */
.leaflet-tile{filter:brightness(.7) invert(1) contrast(2.6) hue-rotate(195deg) saturate(.35) brightness(.72);}
.leaflet-container{background:#20262d; font-family:'Barlow',sans-serif;}

.sicher-marke{display:inline-block; font-size:10px; font-weight:700; letter-spacing:.8px;

<script>

function meldung(text, dauer=3500){
  let el = document.getElementById('meldungBox');
  if(!el){
    el = document.createElement('div');
    el.id = 'meldungBox';
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.classList.add('zeigen');
  clearTimeout(meldung._t);
  meldung._t = setTimeout(()=>{ if(el) el.classList.remove('zeigen'); }, dauer);
}

function bestaetigung(titel, text, aktionText, aktion){
  let ueberlage = document.getElementById('bestaetigungUeberlage');
  if(!ueberlage){
    ueberlage = document.createElement('div');
    ueberlage.id = 'bestaetigungUeberlage';
    document.body.appendChild(ueberlage);
  }
  ueberlage.innerHTML = `
    <div class="bestaetigung-box">
      <div class="bestaetigung-titel">${esc(titel)}</div>
      <div class="bestaetigung-text">${esc(text)}</div>
      <div class="bestaetigung-knoepfe">
        <button class="btn btn-leise" onclick="bestaetigungSchliessen()">Abbrechen</button>
        <button class="btn btn-amber" id="bestaetigungJa">${esc(aktionText)}</button>
      </div>
    </div>`;
  ueberlage.classList.add('zeigen');
  document.getElementById('bestaetigungJa').onclick = ()=>{ bestaetigungSchliessen(); aktion(); };
}
function bestaetigungSchliessen(){
  const u = document.getElementById('bestaetigungUeberlage');
  if(u) u.classList.remove('zeigen');
}

function bildGross(src){
  let el = document.getElementById('bildUeberlage');
  if(!el){
    el = document.createElement('div');
    el.id = 'bildUeberlage';
    el.onclick = bildSchliessen;
    el.innerHTML = '<button class="bild-schliessen" onclick="event.stopPropagation(); bildSchliessen()">✕</button>' +
      '<img id="bildGrossImg" onclick="event.stopPropagation()">';
    document.body.appendChild(el);
  }
  document.getElementById('bildGrossImg').src = src;
  el.classList.add('zeigen');
}
function bildSchliessen(){
  const el = document.getElementById('bildUeberlage');
  if(el) el.classList.remove('zeigen');
}

const firebaseConfig = {
  apiKey: "AIzaSyCpW-NnQwU9Lb08brlkLdqG6Xh3ZqsYKwg",
  authDomain: "pl-holterhoff-baustellen-qs.firebaseapp.com",
  projectId: "pl-holterhoff-baustellen-qs",
  storageBucket: "pl-holterhoff-baustellen-qs.firebasestorage.app",
  messagingSenderId: "544503869793",
  appId: "1:544503869793:web:994f2dd081628bfb9f5520"
};
const FIREBASE_EINGERICHTET = firebaseConfig.apiKey !== "HIER_API_KEY_EINFUEGEN";
let db = null;
let firebaseFehler = null;
if(!FIREBASE_EINGERICHTET){
  firebaseFehler = null;
} else if(typeof firebase === 'undefined'){
  firebaseFehler = 'Firebase Bibliothek konnte nicht geladen werden';
} else {
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    db.enablePersistence({synchronizeTabs:true}).catch(()=>{  });
  }catch(e){ console.error('Firebase Start fehlgeschlagen', e); db = null; firebaseFehler = e.message; }
}

const MERKER = {};
function merkerListe(prefix){ return Object.keys(MERKER).filter(k=>k.startsWith(prefix)); }

async function speicherHolen(schluessel){
  if(db){
    try{
      const snap = await db.collection('kv').doc(schluessel).get();
      return snap.exists ? snap.data() : null;
    }catch(e){ console.error('Lesen fehlgeschlagen', e); meldung('Cloud lesen fehlgeschlagen, ' + (e.code||e.message)); }
  }
  return MERKER[schluessel] !== undefined ? MERKER[schluessel] : null;
}
async function speicherSetzen(schluessel, wert){
  MERKER[schluessel] = wert;
  if(db){
    try{ await db.collection('kv').doc(schluessel).set(wert); }
    catch(e){ console.error('Speichern fehlgeschlagen', e); meldung('Cloud speichern fehlgeschlagen, ' + (e.code||e.message)); }
  }
}
async function speicherLoeschen(schluessel){
  delete MERKER[schluessel];
  if(db){
    try{ await db.collection('kv').doc(schluessel).delete(); }
    catch(e){ console.error('Loeschen fehlgeschlagen', e); }
  }
}
async function speicherListe(prefix){
  if(db){
    try{
      const snap = await db.collection('kv')
        .where(firebase.firestore.FieldPath.documentId(), '>=', prefix)
        .where(firebase.firestore.FieldPath.documentId(), '<', prefix+'\uf8ff')
        .get();
      return snap.docs.map(d=>d.id);
    }catch(e){ console.error('Liste laden fehlgeschlagen', e); }
  }
  return merkerListe(prefix);
}
function indexEchtzeitStarten(){
  db.collection('kv')
    .where(firebase.firestore.FieldPath.documentId(), '>=', 'index:')
    .where(firebase.firestore.FieldPath.documentId(), '<', 'index:\uf8ff')
    .onSnapshot(snap=>{
      logIndex = snap.docs.map(d=>d.data());
      logIndex.sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));
      if(['start','logbuch','auswertungen'].includes(aktuellerScreen)) zeige(aktuellerScreen);
    }, err=>{
      console.error('Echtzeit Abo Logbuch fehlgeschlagen', err);
      meldung('Cloud Synchronisierung Fehler, ' + (err.code || err.message));
      const sync = document.getElementById('syncStatus');
      if(sync){ sync.textContent = 'Fehler bei der Synchronisierung, ' + (err.code || err.message); sync.style.color = 'var(--nein)'; }
    });
}
function mangelEchtzeitStarten(){
  db.collection('kv')
    .where(firebase.firestore.FieldPath.documentId(), '>=', 'mangelindex:')
    .where(firebase.firestore.FieldPath.documentId(), '<', 'mangelindex:\uf8ff')
    .onSnapshot(snap=>{
      mangelIndex = snap.docs.map(d=>d.data());
      mangelIndex.sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));
      if(['start'].includes(aktuellerScreen)) zeige(aktuellerScreen);
    }, err=>{
      console.error('Echtzeit Abo Maengel fehlgeschlagen', err);
      meldung('Cloud Synchronisierung Fehler, ' + (err.code || err.message));
    });
}
function stammdatenEchtzeitStarten(){
  db.collection('kv').doc('stammdaten').onSnapshot(snap=>{
    if(snap.exists){
      stammdaten = snap.data();
      if(!Array.isArray(stammdaten.kategorien)) stammdaten.kategorien = ['Tiefbau','Montage','Dokumentation'];
      if(!Array.isArray(stammdaten.pruefer)) stammdaten.pruefer = [];
      if(!Array.isArray(stammdaten.subunternehmer)) stammdaten.subunternehmer = [];
      if(['projekt','mangel','stammdaten','logbuch','auswertungen'].includes(aktuellerScreen)) zeige(aktuellerScreen);
    }
  }, err=>{
    console.error('Echtzeit Abo Stammdaten fehlgeschlagen', err);
    meldung('Cloud Synchronisierung Fehler, ' + (err.code || err.message));
  });
}

      <option value="">Bitte wählen</option>
      ${liste.map(w=>`<option ${aktuellerWert===w?'selected':''}>${esc(w)}</option>`).join('')}
      <option value="__neu__">+ Neu anlegen</option>
    </select>
    <div id="neu_${kontextName}" class="neu-eintrag-zeile versteckt">
      <input type="text" id="neuWert_${kontextName}" placeholder="Neuer Eintrag" autocomplete="off">
      <button onclick="neuEintragBestaetigen('${kontextName}')">Übernehmen</button>
    </div>`;
}
function auswahlGeaendert(kontextName, wert){
  const kontext = AUSWAHL_KONTEXT[kontextName];
  if(wert === '__neu__'){
    document.getElementById('neu_'+kontextName).classList.remove('versteckt');
    document.getElementById('neuWert_'+kontextName).focus();
    return;
  }
  document.getElementById('neu_'+kontextName).classList.add('versteckt');
  kontext.setzen(wert);
}
async function neuEintragBestaetigen(kontextName){
  const kontext = AUSWAHL_KONTEXT[kontextName];
  const feld = document.getElementById('neuWert_'+kontextName);
  const wert = feld.value.trim();
  if(!wert){ meldung('Bitte einen Namen eingeben'); return; }
  if(!stammdaten[kontext.liste].includes(wert)){
    stammdaten[kontext.liste].push(wert);
    await speicherSetzen('stammdaten', stammdaten, true);
  }
  kontext.setzen(wert);
  kontext.neuZeichnen();
}

function keinSubunternehmerUmschalten(typ){
  const ziel = typ==='besuch' ? besuch : mangelEntwurf;
  ziel.keinSubunternehmer = !ziel.keinSubunternehmer;
  if(ziel.keinSubunternehmer) ziel.subunternehmer = ziel.firma;
  if(typ==='besuch') zeichneProjekt(); else zeichneMangel();
}

function esc(t){ return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function heute(){ return new Date().toISOString().slice(0,10); }
function datumSchoen(iso){ if(!iso) return ''; const [j,m,t]=iso.split('-'); return `${t}.${m}.${j}`; }
function zeitSchoen(iso){
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function filterOptionen(stammdatenListe, indexListe, feld){
  return [...new Set([...(stammdatenListe||[]), ...indexListe.map(e=>e[feld])])].filter(Boolean).sort();
}

function statusRechnen(b){
  let ja=0, nein=0, nb=0, kritisch=0;
  for(const f of BEWERTBARE_FRAGEN){
    const a = b.antworten[f.nr];
    if(!a || !a.wert) continue;
    if(a.wert==='ja') ja++;
    else if(a.wert==='nein'){ nein++; if(f.sicher) kritisch++; }
    else if(a.wert==='nb') nb++;
  }
  const beantwortet = ja+nein+nb;
  let status, klasse;
  if(kritisch>0){ status='Kritisch, sofortige Maßnahme erforderlich'; klasse='rot'; }
  else if(beantwortet===0){ status='Keine Daten vorhanden'; klasse='grau'; }
  else if(beantwortet<BEWERTBARE_FRAGEN.length){ status='In Bearbeitung'; klasse='grau'; }
  else if(nein>0){ status='Mängel vorhanden, Nacharbeit erforderlich'; klasse='gelb'; }
  else { status='Bestanden'; klasse='gruen'; }
  return {ja, nein, nb, kritisch, beantwortet, status, klasse};
}
function ebenenUmschalterHinzufuegen(karte){
  const strassenkarte = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap Mitwirkende', maxZoom:19}).addTo(karte);
  const katasterkarte = L.tileLayer.wms('https://www.wms.nrw.de/geobasis/wms_nw_alkis_grau', {
    layers:'WMS_NW_ALKIS_GRAU', format:'image/png', transparent:true, version:'1.1.1',
    maxZoom:19, attribution:'© Geobasis NRW'});
  L.control.layers({'Straßenkarte':strassenkarte}, {'Katasterkarte, NRW, ab nahem Zoom sichtbar':katasterkarte},
    {position:'topright', collapsed:true}).addTo(karte);
}

function statusFarbe(klasse){
  return klasse==='rot' ? '#E5484D' : klasse==='gelb' ? '#FFB020' : klasse==='gruen' ? '#3FB966' : '#93A0AD';
}

// einfache Zugangssperre, kein Ersatz fuer echte Sicherheit, da das Passwort im
// Quelltext steht, aber ein wirksamer Schutz gegen zufaelliges oeffnen des Links
function zugangPruefen(){
  if(localStorage.getItem('zugangFreigegeben') === APP_PASSWORT){
    appStart();
    return;
  }
  let el = document.getElementById('zugangUeberlage');
  if(!el){
    el = document.createElement('div');
    el.id = 'zugangUeberlage';
    document.body.appendChild(el);
  }
  el.innerHTML = `
    <div class="bestaetigung-box" style="max-width:320px; text-align:center">
      <div class="bestaetigung-titel">Zugang</div>
      <div class="bestaetigung-text">Bitte das Passwort für Baustellen QS + Mängelerfassung eingeben</div>
      <input type="password" id="zugangFeld" placeholder="Passwort" autocomplete="off"
        style="width:100%; box-sizing:border-box; background:var(--flaeche2); border:1px solid var(--linie);
        border-radius:10px; color:var(--schrift); padding:12px; font-size:16px; margin-bottom:12px; text-align:center">
      <div id="zugangFehler" style="color:var(--nein); font-size:13px; margin-bottom:10px"></div>
      <button class="btn btn-amber" onclick="zugangBestaetigen()">Bestätigen</button>
    </div>`;
  el.classList.add('zeigen');
  const feld = document.getElementById('zugangFeld');
  feld.focus();
  feld.onkeydown = e=>{ if(e.key==='Enter') zugangBestaetigen(); };
}
function zugangBestaetigen(){
  const wert = document.getElementById('zugangFeld').value;
  if(wert === APP_PASSWORT){
    localStorage.setItem('zugangFreigegeben', APP_PASSWORT);
    document.getElementById('zugangUeberlage').remove();
    appStart();
  } else {
    document.getElementById('zugangFehler').textContent = 'Falsches Passwort, bitte erneut versuchen';
    document.getElementById('zugangFeld').value = '';
    document.getElementById('zugangFeld').focus();
  }
}

async function appStart(){
  const sync = document.getElementById('syncStatus');
  if(!FIREBASE_EINGERICHTET){
    if(sync){ sync.textContent = 'Nur lokal auf diesem Gerät, Cloud noch nicht eingerichtet'; }
  } else if(!db){
    if(sync){ sync.textContent = 'Cloud Synchronisierung konnte nicht gestartet werden' + (firebaseFehler ? ', '+firebaseFehler : ''); sync.style.color = 'var(--nein)'; }
  } else {
    if(sync){ sync.textContent = 'Cloud Synchronisierung aktiv, alle Geräte in Echtzeit'; sync.style.color = 'var(--ja)'; }
  }

  const sd = await speicherHolen('stammdaten');
  if(sd){
    stammdaten = sd;
    if(!Array.isArray(stammdaten.kategorien)) stammdaten.kategorien = ['Tiefbau','Montage','Dokumentation'];
    if(!Array.isArray(stammdaten.pruefer)) stammdaten.pruefer = [];
    if(!Array.isArray(stammdaten.subunternehmer)) stammdaten.subunternehmer = [];
  } else{
    stammdaten = { kennungen:[], firmen:[], kategorien:['Tiefbau','Montage','Dokumentation'], pruefer:[], subunternehmer:[] };
    await speicherSetzen('stammdaten', stammdaten);
  }

  if(db){
    indexEchtzeitStarten();
    mangelEchtzeitStarten();
    stammdatenEchtzeitStarten();
  } else {
    await indexAlleLaden();
    await mangelIndexLaden();
  }
  zeige('start');
}

async function indexAlleLaden(){
  const schluessel = await speicherListe('index:', true);
  const eintraege = [];
  for(const k of schluessel){
    const w = await speicherHolen(k, true);
    if(w) eintraege.push(w);
  }
  eintraege.sort((a,b)=> (b.datum||'').localeCompare(a.datum||''));
  logIndex = eintraege;
}
async function mangelIndexLaden(){
  const schluessel = await speicherListe('mangelindex:');
  const eintraege = [];
  for(const k of schluessel){
    const w = await speicherHolen(k);
    if(w) eintraege.push(w);
  }
  eintraege.sort((a,b)=> (b.datum||'').localeCompare(a.datum||''));
  mangelIndex = eintraege;
}

function zeige(screen){
  if(gpsWatchId !== null){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  aktuellerScreen = screen;
  ['navStart','navLogbuch','navAuswertungen','navStamm'].forEach(id=>document.getElementById(id).classList.remove('aktiv'));
  if(screen==='start') document.getElementById('navStart').classList.add('aktiv');
  if(screen==='logbuch') document.getElementById('navLogbuch').classList.add('aktiv');
  if(screen==='auswertungen') document.getElementById('navAuswertungen').classList.add('aktiv');
  if(screen==='stammdaten') document.getElementById('navStamm').classList.add('aktiv');
  fortschrittZeigen(false);
  if(screen==='start') zeichneStart();
  if(screen==='logbuch') zeichneLogbuch();
  if(screen==='auswertungen') zeichneAuswertungen();
  if(screen==='stammdaten') zeichneStammdaten();
  if(screen==='projekt') zeichneProjekt();
  if(screen==='mangel') zeichneMangel();
  if(screen==='fragen') zeichneFragen();
  if(screen==='abschluss') zeichneAbschluss();
  if(screen==='ansicht') zeichneAnsicht();
  if(screen==='mangelAnsicht') zeichneMangelAnsicht();
  window.scrollTo(0,0);
}

function fortschrittZeigen(an){
  document.getElementById('warnband').style.display = an ? 'block' : 'none';
  document.getElementById('fortschrittText').style.display = an ? 'block' : 'none';
}
function fortschrittAktualisieren(){
  if(!besuch) return;
  const s = statusRechnen(besuch);
  const prozent = Math.round(s.beantwortet / BEWERTBARE_FRAGEN.length * 100);
  document.getElementById('warnbandFuell').style.width = prozent + '%';
  document.getElementById('fortschrittText').textContent =
    s.beantwortet + ' von ' + BEWERTBARE_FRAGEN.length + ' Fragen beantwortet';
}

    </div>`;
  setTimeout(startKarteBauen, 50);

function startKarteBauen(){
  const el = document.getElementById('startKarte');
  if(!el) return;
  if(typeof L==='undefined'){
    el.innerHTML = '<div style="padding:16px;font-size:13px;line-height:1.55;color:var(--schrift2)">Die Kartenbibliothek konnte nicht geladen werden. Das passiert meist ohne Internetverbindung oder wenn die Seite außerhalb eines echten Browsers geöffnet wurde. Bitte im Browser mit Internetverbindung erneut versuchen.</div>';
    return;
  }
  startKarte = L.map('startKarte');
  ebenenUmschalterHinzufuegen(startKarte);
  const mitOrt = logIndex.filter(e=>e.lat && e.lng);
  const mangelMitOrt = mangelIndex.filter(e=>e.lat && e.lng);
  const gruppe = [];
  mitOrt.forEach(e=>{
    const m = L.circleMarker([e.lat, e.lng], {radius:7, color:'var(--amber)',
      fillColor:'#FFB020', fillOpacity:.85, weight:2}).addTo(startKarte);
    m.bindPopup(`<b>${esc(e.kennung)}</b><br>${esc(e.firma)}<br>${datumSchoen(e.datum)}, V${e.revision}<br>` +
      `<a href="#" onclick="eintragOeffnen('${e.id}');return false;">Eintrag öffnen</a>`);
    gruppe.push([e.lat, e.lng]);
  });
  mangelMitOrt.forEach(e=>{
    const rautenFarbe = e.behoben ? '#3FB966' : (e.kritisch ? '#E5484D' : (e.kategorie==='Montage' ? '#4DA3FF' : '#FF8A3D'));
    const icon = L.divIcon({className:'', iconSize:[11,11], iconAnchor:[6,6],
      html:'<div style="width:11px;height:11px;background:'+rautenFarbe+';border:2px solid #14171B;transform:rotate(45deg)"></div>'});
    const m = L.marker([e.lat, e.lng], {icon}).addTo(startKarte);
    m.bindPopup(`<b>Mangel, ${esc(e.kategorie)}</b><br>${esc(e.firma||'ohne Firma')}<br>${datumSchoen(e.datum)}<br>${e.behoben ? 'Behoben' : (e.kritisch ? 'Offen, kritisch' : 'Offen')}<br>` +
      `<a href="#" onclick="mangelOeffnen('${e.id}','start');return false;">Mangel öffnen</a>`);
    gruppe.push([e.lat, e.lng]);
  });
  if(gruppe.length){
    startKarte.fitBounds(gruppe, {padding:[30,30], maxZoom:15});
  } else {
    startKarte.setView([51.388, 8.141], 13);
  }
  setTimeout(()=>startKarte.invalidateSize(), 200);
}

function kennungFiltern(){
  const feld = document.getElementById('kennungSuche');
  const liste = document.getElementById('kennungListe');
  const suche = feld.value.toLowerCase();
  const treffer = stammdaten.kennungen.filter(k=>k.toLowerCase().includes(suche));
  besuch.kennung = feld.value;
  if(!treffer.length){ liste.style.display='none'; return; }
  liste.innerHTML = treffer.map(k=>`<div onclick="kennungWaehlen('${esc(k).replace(/'/g,"\\'")}')">${esc(k)}</div>`).join('');
  liste.style.display='block';
}
function kennungWaehlen(k){
  besuch.kennung = k;
  document.getElementById('kennungSuche').value = k;
  document.getElementById('kennungListe').style.display='none';
}

function standortWechsel(tab){
  standortTab = tab;
  ['adresse','gps','karte'].forEach(t=>{
    document.getElementById('tab'+t[0].toUpperCase()+t.slice(1)).classList.toggle('aktiv', t===tab);
    document.getElementById('panel'+t[0].toUpperCase()+t.slice(1)).classList.toggle('versteckt', t!==tab);
  });
  if(tab==='karte') setTimeout(pickKarteBauen, 60);
}

function pickKarteBauen(){
  const el = document.getElementById('pickKarte');
  if(!el) return;
  if(typeof L==='undefined'){
    el.innerHTML = '<div style="padding:16px;font-size:13px;line-height:1.55;color:var(--schrift2)">Die Kartenbibliothek konnte nicht geladen werden, bitte Adresse oder GPS Erkennung nutzen, oder im Browser mit Internetverbindung erneut versuchen.</div>';
    return;
  }
  if(pickKarte){ pickKarte.remove(); pickKarte=null; }
  pickKarte = L.map('pickKarte');
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(pickKarte);
  if(aktuellerOrtZiel.lat && aktuellerOrtZiel.lng){
    pickKarte.setView([aktuellerOrtZiel.lat, aktuellerOrtZiel.lng], 16);
    pickMarker = L.marker([aktuellerOrtZiel.lat, aktuellerOrtZiel.lng]).addTo(pickKarte);
  } else {
    pickKarte.setView([51.388, 8.141], 13);
  }
  pickKarte.on('click', e=>{
    aktuellerOrtZiel.lat = Math.round(e.latlng.lat*1e6)/1e6;
    aktuellerOrtZiel.lng = Math.round(e.latlng.lng*1e6)/1e6;
    if(pickMarker) pickMarker.setLatLng(e.latlng); else pickMarker = L.marker(e.latlng).addTo(pickKarte);
    koordAnzeigen();
  });
  setTimeout(()=>pickKarte.invalidateSize(), 200);
}

let gpsWatchId = null;
function gpsHolen(){
  const anzeige = document.getElementById('gpsAnzeige');
  if(!navigator.geolocation){ anzeige.textContent='Standorterkennung wird auf diesem Gerät nicht unterstützt'; return; }
  if(gpsWatchId !== null){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  anzeige.textContent = 'Standort wird ermittelt, das GPS Signal braucht bis zu 30 Sekunden zum Einpendeln …';
  let besteGenauigkeit = Infinity;
  let messungen = 0;
  const beenden = ()=>{ if(gpsWatchId!==null){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId=null; } };
  gpsWatchId = navigator.geolocation.watchPosition(pos=>{
    messungen++;
    if(pos.coords.accuracy < besteGenauigkeit){
      besteGenauigkeit = pos.coords.accuracy;
      aktuellerOrtZiel.lat = Math.round(pos.coords.latitude*1e6)/1e6;
      aktuellerOrtZiel.lng = Math.round(pos.coords.longitude*1e6)/1e6;
      koordAnzeigen();
    }
    const genauGenug = besteGenauigkeit <= 25;
    let text = (genauGenug ? 'Standort übernommen, Genauigkeit etwa ' : 'Wird noch genauer, bisher etwa ') +
      '<b>' + Math.round(besteGenauigkeit) + ' m</b>';
    if(besteGenauigkeit > 1000){
      text += '<br>Diese Genauigkeit ist untypisch schlecht für GPS, das deutet meist auf die iPhone Einstellung "Genauer Standort" hin. Bitte prüfen unter Einstellungen, Datenschutz und Sicherheit, Ortungsdienste, Safari Websites, dort "Genauer Standort" einschalten, bei installierter App auch unter dem App Namen selbst.';
    } else if(besteGenauigkeit > 100){
      text += '<br>Achtung, diese Genauigkeit ist grob. Bitte etwas warten, ins Freie gehen, oder den Standort über die Karte per Fingertipp genauer setzen.';
    }
    anzeige.innerHTML = text;
    if(genauGenug || messungen >= 20) beenden();
  }, err=>{
    beenden();
    if(err.code === 1){
      anzeige.textContent = 'Standort wurde nicht freigegeben, bitte in den iPhone Einstellungen unter Safari, Standort, die Freigabe erteilen';
    } else if(err.code === 2){
      anzeige.textContent = 'Standort aktuell nicht bestimmbar, bitte kurz warten oder ins Freie gehen und erneut versuchen';
    } else if(err.code === 3){
      anzeige.textContent = 'Standortermittlung hat zu lange gedauert, bitte erneut versuchen';
    } else {
      anzeige.textContent = 'Standort konnte nicht ermittelt werden, bitte Karte oder Adresse nutzen';
    }
  }, {enableHighAccuracy:true, timeout:32000, maximumAge:0});
  setTimeout(beenden, 30000);
}

function koordAnzeigen(){

    : 'Noch keine Koordinaten gespeichert';
}

async function adresseZuKoordinaten(ziel){
  if(ziel.lat && ziel.lng) return true;
  const teile = [ziel.strasse, ziel.ort].filter(t=>t && t.trim());
  if(!teile.length) return false;
  const suche = teile.join(', ') + ', Deutschland';
  try{
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(suche);
    const antwort = await fetch(url, {headers:{'Accept':'application/json'}});
    const daten = await antwort.json();
    if(daten && daten.length){
      ziel.lat = Math.round(parseFloat(daten[0].lat)*1e6)/1e6;
      ziel.lng = Math.round(parseFloat(daten[0].lon)*1e6)/1e6;
      return true;
    }
  }catch(e){ console.error('Adresssuche fehlgeschlagen', e); }
  return false;
}

async function koordinatenZuAdresse(lat, lng){
  try{
    const url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng;
    const antwort = await fetch(url, {headers:{'Accept':'application/json'}});
    const daten = await antwort.json();
    if(daten && daten.address){
      const a = daten.address;
      const strasse = [a.road, a.house_number].filter(Boolean).join(' ');
      const ort = [a.postcode, a.city||a.town||a.village||a.municipality].filter(Boolean).join(' ');
      const ergebnis = [strasse, ort].filter(Boolean).join(', ');
      if(ergebnis) return ergebnis;
      if(daten.display_name) return daten.display_name;
    }
  }catch(e){ console.error('Adressermittlung aus Koordinaten fehlgeschlagen', e); }
  return null;
}

async function mangelSpeichern(){
  const m = mangelEntwurf;
  if(!m.eintrager){ meldung('Bitte angeben, wer den Mangel einträgt'); return; }
  if(!m.firma){ meldung('Bitte eine Tiefbaufirma wählen'); return; }
  if(m.keinSubunternehmer) m.subunternehmer = m.firma;
  if(!m.subunternehmer){ meldung('Bitte einen Subunternehmer angeben, oder Kein separater Subunternehmer ankreuzen'); return; }
  const hatStandort = (m.strasse && m.strasse.trim()) || (m.ort && m.ort.trim()) || (m.lat && m.lng);
  if(!hatStandort){ meldung('Bitte einen Standort angeben, Adresse, GPS oder Karte'); return; }
  if(!m.lat || !m.lng){
    meldung('Standort wird ermittelt …');
    await adresseZuKoordinaten(m);
  }
  const vorherigeFotoAnzahl = (mangelIndex.find(e=>e.id===m.id) || {}).fotoAnzahl || 0;
  const jetzt = new Date().toISOString();
  if(!m.gespeichertAm) m.gespeichertAm = jetzt;
  if(mangelBearbeitenAktiv) m.geaendertAm = jetzt;
  const fotos = m.fotos || [];
  for(let i=0; i<fotos.length; i++){
    await speicherSetzen('mangelfoto:'+m.id+':'+i, {daten:fotos[i]});
  }
  for(let i=fotos.length; i<vorherigeFotoAnzahl; i++){
    await speicherLoeschen('mangelfoto:'+m.id+':'+i);
  }
  const mangelZumSpeichern = {...m, fotos:undefined, fotoAnzahl:fotos.length};
  delete mangelZumSpeichern.fotos;
  await speicherSetzen('mangel:'+m.id, mangelZumSpeichern);
  const meta = {id:m.id, kategorie:m.kategorie, firma:m.firma, eintrager:m.eintrager, subunternehmer:m.subunternehmer, datum:m.datum,
    strasse:m.strasse, ort:m.ort, lat:m.lat, lng:m.lng, gespeichertAm:m.gespeichertAm,
    geaendertAm:m.geaendertAm||null, fotoAnzahl:fotos.length, behoben:!!m.behoben, behobenAm:m.behobenAm||null,
    kritisch:!!m.kritisch};
  await speicherSetzen('mangelindex:'+m.id, meta);
  await mangelIndexLaden();
  meldung(mangelBearbeitenAktiv ? 'Änderung wurde gespeichert' : 'Mangel wurde gespeichert');
  mangelEntwurf = null;
  const ziel = mangelBearbeitenAktiv ? mangelBearbeitenHerkunft : 'start';
  mangelBearbeitenAktiv = false;
  zeige(ziel);
}

function fotoVerarbeiten(datei){
  if(!datei || (!mangelFotoAktiv && aktuelleFotoFrage===null)) return;
  const leser = new FileReader();
  leser.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const max = 900;
      let w = img.width, h = img.height;
      if(w>h && w>max){ h = h*max/w; w = max; }
      else if(h>=w && h>max){ w = w*max/h; h = max; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const datenUrl = c.toDataURL('image/jpeg', .72);
      if(mangelFotoAktiv){
        mangelEntwurf.fotos.push(datenUrl);
        mangelFotoAktiv = false;
        zeichneMangel();
      } else {
        antwortHolen(aktuelleFotoFrage).foto = datenUrl;
        frageNeuZeichnen(aktuelleFotoFrage);
        aktuelleFotoFrage = null;
      }
    };
    img.src = ev.target.result;
  };
  leser.readAsDataURL(datei);
}

async function besuchSpeichern(){
  const s = statusRechnen(besuch);
  if(!besuch.lat || !besuch.lng){
    meldung('Standort wird ermittelt …');
    await adresseZuKoordinaten(besuch);
  }
  const jetztBesuch = new Date().toISOString();
  if(!besuch.gespeichertAm) besuch.gespeichertAm = jetztBesuch;
  if(besuch.revision > 1) besuch.geaendertAm = jetztBesuch;
  const besuchZumSpeichern = JSON.parse(JSON.stringify(besuch));
  for(const nr in besuchZumSpeichern.antworten){
    const a = besuchZumSpeichern.antworten[nr];
    if(a && a.foto){
      await speicherSetzen('besuchfoto:'+besuch.id+':'+nr, {daten:a.foto}, true);
      a.foto = true;
    }
  }
  await speicherSetzen('besuch:'+besuch.id, besuchZumSpeichern, true);
  const meta = {id:besuch.id, kennung:besuch.kennung, firma:besuch.firma, pruefer:besuch.pruefer,
    subunternehmer:besuch.subunternehmer, datum:besuch.datum, revision:besuch.revision, klasse:s.klasse, status:s.status,
    lat:besuch.lat, lng:besuch.lng, gespeichertAm:besuch.gespeichertAm, geaendertAm:besuch.geaendertAm||null};
  await speicherSetzen('index:'+besuch.id, meta, true);
  await indexAlleLaden();
  meldung('Besuch wurde als Logeintrag gespeichert, Revisionsstand V'+besuch.revision);
  besuch = null;
  zeige('logbuch');
}

  const kombiniert = [

    ...mangelIndex.map(e=>({...e, _typ:'mangel'}))

    if(logAlleFilter.typ && ((logAlleFilter.typ==='besuch' && e._typ!=='besuch') || (logAlleFilter.typ==='mangel' && e._typ!=='mangel'))) return false;

    if(logAlleFilter.pruefer && e.pruefer!==logAlleFilter.pruefer && e.eintrager!==logAlleFilter.pruefer) return false;
    if(logAlleFilter.status){

    if(logAlleFilter.von && e.datum < logAlleFilter.von) return false;
    if(logAlleFilter.bis && e.datum > logAlleFilter.bis) return false;

function mangelBehobenAnfragen(id){
  const e = mangelIndex.find(x=>x.id===id);
  bestaetigung('Mangel als behoben markieren',
    'Soll dieser Mangel'+(e && e.kategorie ? ' der Kategorie '+e.kategorie : '')+' als behoben markiert werden? Er erscheint danach grün und zählt als erledigt.',
    'Als behoben markieren',
    ()=>mangelAlsBehoben(id));
}
async function mangelAlsBehoben(id){
  const m = await speicherHolen('mangel:'+id);
  if(!m){ meldung('Mangel konnte nicht geladen werden'); return; }
  m.behoben = true;
  m.behobenAm = new Date().toISOString();
  await speicherSetzen('mangel:'+id, m);
  const meta = mangelIndex.find(e=>e.id===id);
  if(meta){
    const neu = {...meta, behoben:true, behobenAm:m.behobenAm};
    await speicherSetzen('mangelindex:'+id, neu);
    meta.behoben = true;
    meta.behobenAm = m.behobenAm;
  }
  await mangelIndexLaden();
  if(ansichtMangel && ansichtMangel.id===id){ ansichtMangel.behoben = true; ansichtMangel.behobenAm = m.behobenAm; }
  meldung('Mangel wurde als behoben markiert');
  zeige(aktuellerScreen);
}

function mangelWiederOeffnenAnfragen(id){
  const e = mangelIndex.find(x=>x.id===id);
  bestaetigung('Mangel wieder öffnen',
    'Soll dieser Mangel'+(e && e.kategorie ? ' der Kategorie '+e.kategorie : '')+' wieder als offen markiert werden? Er erscheint danach wieder orange und zählt wieder als noch zu erledigen.',
    'Wieder öffnen',
    ()=>mangelWiederOeffnen(id));
}
async function mangelWiederOeffnen(id){
  const m = await speicherHolen('mangel:'+id);
  if(!m){ meldung('Mangel konnte nicht geladen werden'); return; }
  m.behoben = false;
  m.behobenAm = null;
  await speicherSetzen('mangel:'+id, m);
  const meta = mangelIndex.find(e=>e.id===id);
  if(meta){
    const neu = {...meta, behoben:false, behobenAm:null};
    await speicherSetzen('mangelindex:'+id, neu);
    meta.behoben = false;
    meta.behobenAm = null;
  }
  await mangelIndexLaden();
  if(ansichtMangel && ansichtMangel.id===id){ ansichtMangel.behoben = false; ansichtMangel.behobenAm = null; }
  meldung('Mangel wurde wieder geöffnet');
  zeige(aktuellerScreen);
}

async function besuchDirektDrucken(id){
  const b = await speicherHolen('besuch:'+id, true);
  if(!b){ meldung('Eintrag konnte nicht geladen werden'); return; }
  for(const nr in b.antworten){

async function logbuchExportieren(){

  const auswahl = logIndex.filter(e=>{
    if(logFilter.kennung && e.kennung!==logFilter.kennung) return false;
    if(logFilter.firma && e.firma!==logFilter.firma) return false;
    if(logFilter.subunternehmer && e.subunternehmer!==logFilter.subunternehmer) return false;
    if(logFilter.pruefer && e.pruefer!==logFilter.pruefer) return false;
    if(logFilter.status && e.status!==logFilter.status) return false;
    if(logFilter.von && e.datum < logFilter.von) return false;
    if(logFilter.bis && e.datum > logFilter.bis) return false;
    return true;
  });
  if(!auswahl.length){ meldung('Keine Besuche für diese Auswahl'); return; }
  const spalten = ['Projektkenner','Tiefbaufirma','Subunternehmer','Pruefer','Datum','Revisionsstand','Status',
    'Kategorie','Nr','Frage','Antwort','Kommentar','Foto vorhanden'];
  const zeilen = [spalten.join(';')];
  for(const e of auswahl){
    const b = await speicherHolen('besuch:'+e.id);
    if(!b){
      zeilen.push([e.kennung, e.firma||'', e.subunternehmer||'', e.pruefer||'', e.datum||'', 'V'+e.revision, e.status,
        '','','','','',''].map(csvFeld).join(';'));
      continue;
    }
    KATEGORIEN.forEach((kat, ki)=>{
      FRAGEN.filter(f=>f.kat===ki).forEach(f=>{
        const a = b.antworten[f.nr] || {};
        let antwort;
        if(f.typ === 'text'){
          antwort = a.ausgefuellt ? (a.text || '') : 'nicht ausgefüllt';
        } else {
          antwort = a.wert==='ja' ? 'Ja' : a.wert==='nein' ? 'Nein' : a.wert==='nb' ? 'Nicht bewertbar' : 'offen';
        }
        zeilen.push([e.kennung, e.firma||'', e.subunternehmer||'', e.pruefer||'', e.datum||'', 'V'+e.revision, e.status,
          kat.name, f.nr, f.text, antwort, a.kommentar||'', a.foto ? 'Ja' : 'Nein'].map(csvFeld).join(';'));
      });
    });
  }
  csvHerunterladen(zeilen, 'Besuche_Export_' + heute() + '.csv');
}

function csvFeld(wert){
  wert = String(wert ?? '');
  if(/[;"\n]/.test(wert)) wert = '"' + wert.replace(/"/g,'""') + '"';
  return wert;
}
function csvHerunterladen(zeilen, dateiname){
  const inhalt = '\uFEFF' + zeilen.join('\r\n');
  const blob = new Blob([inhalt], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = dateiname;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  meldung('Export wurde erstellt, in Dateien oder Downloads zu finden');
}

async function maengelAusExportieren(){
  meldung('Export wird vorbereitet');
  const auswahl = mangelIndex.filter(e=>{
    if(mangelFilter.kategorie && e.kategorie!==mangelFilter.kategorie) return false;
    if(mangelFilter.firma && e.firma!==mangelFilter.firma) return false;
    if(mangelFilter.subunternehmer && e.subunternehmer!==mangelFilter.subunternehmer) return false;
    if(mangelFilter.eintrager && e.eintrager!==mangelFilter.eintrager) return false;
    if(mangelFilter.status && mangelStatusText(e)!==mangelFilter.status) return false;
    if(mangelFilter.von && e.datum < mangelFilter.von) return false;
    if(mangelFilter.bis && e.datum > mangelFilter.bis) return false;
    return true;
  });
  if(!auswahl.length){ meldung('Keine Mängel für diese Auswahl'); return; }
  const spalten = ['Kategorie','Tiefbaufirma','Subunternehmer','Eintragung durch','Status','Datum','Uhrzeit',
    'Strasse','Ort','Anzahl Fotos','Behoben am','Kommentar'];
  const zeilen = [spalten.join(';')];
  for(const e of auswahl){
    const m = await speicherHolen('mangel:'+e.id);
    zeilen.push([e.kategorie||'', e.firma||'', e.subunternehmer||'', e.eintrager||'', mangelStatusText(e), e.datum||'',
      zeitSchoen(e.gespeichertAm), e.strasse||'', e.ort||'', e.fotoAnzahl??0,
      e.behobenAm ? datumSchoen(e.behobenAm.slice(0,10))+' '+zeitSchoen(e.behobenAm) : '',
      m ? (m.kommentar||'') : ''].map(csvFeld).join(';'));
  }
  csvHerunterladen(zeilen, 'Maengelauswertung_' + heute() + '.csv');
}

function monatsZaehlungBauen(liste){
  const eimer = {};
  liste.forEach(e=>{
    if(!e.datum) return;
    const monat = e.datum.slice(0,7);
    eimer[monat] = (eimer[monat]||0) + 1;
  });
  return Object.keys(eimer).sort().map(m=>{
    const [jahr, monatNr] = m.split('-');
    return {label: monatNr+'.'+jahr.slice(2), anzahl: eimer[m]};
  });
}
function zaehlBalkenHorizontalSvg(daten){
  const balkenX = 104, balkenBreite = 150, zeilenHoehe = 32, oben = 6;
  const hoehe = oben*2 + daten.length*zeilenHoehe;
  const max = Math.max(1, ...daten.map(d=>d.anzahl));
  let svg = `<svg viewBox="0 0 300 ${hoehe}" width="100%" style="display:block">`;
  daten.forEach((d,i)=>{
    const y = oben + i*zeilenHoehe;
    const w = Math.round(balkenBreite * d.anzahl/max);
    svg += `<text x="0" y="${y+15}" font-size="11" fill="#93A0AD" font-family="Barlow,sans-serif">${esc(d.name)}</text>`;
    svg += `<rect x="${balkenX}" y="${y+3}" width="${balkenBreite}" height="16" rx="4" fill="#242B33"/>`;
    if(w>0) svg += `<rect x="${balkenX}" y="${y+3}" width="${w}" height="16" rx="4" fill="${d.farbe}"/>`;
    svg += `<text x="${balkenX+balkenBreite+8}" y="${y+15}" font-size="11" fill="#E9ECEF" font-family="Barlow,sans-serif">${d.anzahl}</text>`;
  });
  svg += `</svg>`;
  return svg;
}

function kategorieDatenBauen(volleBesuche){
  const kurzname = {
    'Arbeitssicherheit':'Sicherheit',
    'Qualität Tiefbau und Verlegung':'Qualität Tiefbau',
    'Dokumentation':'Dokumentation',
    'Baustellenorganisation und Umwelt':'Organisation'
  };
  return KATEGORIEN.map((kat,ki)=>{
    let ja=0, nein=0, nichtBewertet=0;
    const fragenDieserKat = FRAGEN.filter(f=>f.kat===ki && f.typ!=='text');
    volleBesuche.forEach(b=>{
      fragenDieserKat.forEach(f=>{
        const a = b.antworten[f.nr];
        if(a && a.wert==='ja') ja++;
        else if(a && a.wert==='nein') nein++;
        else nichtBewertet++; // nicht bewertbar angekreuzt, oder ueberhaupt nicht beantwortet
      });
    });
    const ges = ja+nein;
    return {name:kurzname[kat.name]||kat.name, farbe:kat.farbe, prozent: ges ? Math.round(ja/ges*100) : null, nichtBewertet};
  });
}
function monatsDatenBauen(volleBesuche){
  const eimer = {};
  volleBesuche.forEach(b=>{
    if(!b.datum) return;
    const monat = b.datum.slice(0,7);
    if(!eimer[monat]) eimer[monat] = {ja:0, nein:0, anzahl:0};
    const s = statusRechnen(b);
    eimer[monat].ja += s.ja;
    eimer[monat].nein += s.nein;
    eimer[monat].anzahl += 1;
  });
  return Object.keys(eimer).sort().map(m=>{
    const e = eimer[m];
    const [jahr, monatNr] = m.split('-');
    const beantwortet = e.ja+e.nein;
    return {label: monatNr+'.'+jahr.slice(2), anzahl:e.anzahl,
      prozent: beantwortet ? Math.round(e.ja/beantwortet*100) : null};
  });
}
function kategorieChartSvg(daten){
  const balkenX = 104, balkenBreite = 150, zeilenHoehe = 40, oben = 6;
  const hoehe = oben*2 + daten.length*zeilenHoehe + 14;
  let svg = `<svg viewBox="0 0 300 ${hoehe}" width="100%" style="display:block">`;
  svg += `<text x="${balkenX+balkenBreite}" y="10" font-size="9" fill="#5B6572" font-family="Barlow,sans-serif" text-anchor="end">Ziel 100%</text>`;
  svg += `<line x1="${balkenX+balkenBreite}" y1="14" x2="${balkenX+balkenBreite}" y2="${hoehe-6}" stroke="#5B6572" stroke-width="1" stroke-dasharray="2,2"/>`;
  daten.forEach((d,i)=>{
    const y = oben + 14 + i*zeilenHoehe;
    const w = d.prozent===null ? 0 : Math.round(balkenBreite * d.prozent/100);
    svg += `<text x="0" y="${y+15}" font-size="11" fill="#93A0AD" font-family="Barlow,sans-serif">${esc(d.name)}</text>`;
    svg += `<rect x="${balkenX}" y="${y+3}" width="${balkenBreite}" height="16" rx="4" fill="#242B33"/>`;
    if(w>0) svg += `<rect x="${balkenX}" y="${y+3}" width="${w}" height="16" rx="4" fill="${d.farbe}"/>`;
    svg += `<text x="${balkenX+balkenBreite+8}" y="${y+15}" font-size="11" fill="#E9ECEF" font-family="Barlow,sans-serif">${d.prozent===null?'–':d.prozent+'%'}</text>`;
    svg += `<text x="${balkenX}" y="${y+27}" font-size="9" fill="#5B6572" font-family="Barlow,sans-serif">${d.nichtBewertet ? d.nichtBewertet+' Frage(n) nicht bewertet' : 'alle Fragen bewertet'}</text>`;
  });
  svg += `</svg>`;
  return svg;
}
function balkenAnzahlSvg(monate){
  const breite=300, hoehe=120, oben=10, unten=24;
  const nutzB = breite-16, nutzH = hoehe-oben-unten;
  const schritt = nutzB/monate.length;
  const balkenBreite = Math.min(38, schritt-10);
  const maxAnzahl = Math.max(1, ...monate.map(m=>m.anzahl));
  let svg = `<svg viewBox="0 0 ${breite} ${hoehe}" width="100%" style="display:block">`;
  monate.forEach((m,i)=>{
    const h = Math.round(nutzH * m.anzahl/maxAnzahl);
    const x = 8 + i*schritt + (schritt-balkenBreite)/2;
    const y = oben + (nutzH-h);
    svg += `<rect x="${x}" y="${y}" width="${balkenBreite}" height="${Math.max(h,2)}" rx="3" fill="#FFB020"/>`;
    svg += `<text x="${x+balkenBreite/2}" y="${oben+nutzH+14}" font-size="9" fill="#93A0AD" text-anchor="middle" font-family="Barlow,sans-serif">${esc(m.label)}</text>`;
    svg += `<text x="${x+balkenBreite/2}" y="${y-4}" font-size="10" fill="#E9ECEF" text-anchor="middle" font-family="Barlow,sans-serif">${m.anzahl}</text>`;
  });
  svg += `</svg>`;
  return svg;
}
function trendLinienSvg(monate){
  const breite=300, hoehe=130, li=22, re=8, oben=10, unten=22;
  const nutzB = breite-li-re, nutzH = hoehe-oben-unten;
  let svg = `<svg viewBox="0 0 ${breite} ${hoehe}" width="100%" style="display:block">`;
  [0,50,100].forEach(p=>{
    const y = oben + nutzH - nutzH*p/100;
    svg += `<line x1="${li}" y1="${y}" x2="${breite-re}" y2="${y}" stroke="#2E3640" stroke-width="1"/>`;
    svg += `<text x="${li-4}" y="${y+3}" font-size="8" fill="#93A0AD" text-anchor="end" font-family="Barlow,sans-serif">${p}</text>`;
  });
  const mitWert = monate.filter(m=>m.prozent!==null);
  if(mitWert.length){
    const schritt = mitWert.length>1 ? nutzB/(mitWert.length-1) : 0;
    let pfad = '';
    mitWert.forEach((m,i)=>{
      const x = li + i*schritt, y = oben + nutzH - nutzH*m.prozent/100;
      pfad += (i===0?'M':'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
    });
    svg += `<path d="${pfad.trim()}" fill="none" stroke="#FFB020" stroke-width="2.5"/>`;
    mitWert.forEach((m,i)=>{
      const x = li + i*schritt, y = oben + nutzH - nutzH*m.prozent/100;
      svg += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.2" fill="#FFB020"/>`;
      svg += `<text x="${x.toFixed(1)}" y="${hoehe-6}" font-size="9" fill="#93A0AD" text-anchor="middle" font-family="Barlow,sans-serif">${esc(m.label)}</text>`;
    });
  } else {
    svg += `<text x="${breite/2}" y="${hoehe/2}" font-size="12" fill="#93A0AD" text-anchor="middle" font-family="Barlow,sans-serif">Keine Daten</text>`;
  }
  svg += `</svg>`;
  return svg;
}

async function eintragOeffnen(id){
  const b = await speicherHolen('besuch:'+id, true);
  if(!b){ meldung('Eintrag konnte nicht geladen werden'); return; }
  for(const nr in b.antworten){
    const a = b.antworten[nr];
    if(a && a.foto === true){
      const f = await speicherHolen('besuchfoto:'+id+':'+nr, true);
      a.foto = f ? f.daten : null;
    }
  }
  ansichtBesuch = b;
  zeige('ansicht');
}

async function mangelOeffnen(id, herkunft){
  const m = await speicherHolen('mangel:'+id);
  if(!m){ meldung('Mangel konnte nicht geladen werden'); return; }
  m.fotos = await mangelFotosLaden(id, m.fotoAnzahl);
  ansichtMangel = m;
  mangelAnsichtHerkunft = herkunft || 'logbuch';
  zeige('mangelAnsicht');
}
async function mangelFotosLaden(id, anzahl){
  const fotos = [];
  for(let i=0; i<(anzahl||0); i++){
    const f = await speicherHolen('mangelfoto:'+id+':'+i);
    if(f) fotos.push(f.daten);
  }
  return fotos;
}

async function mangelLoeschen(){

function druckStarten(bereich){
  const bilder = Array.from(bereich.querySelectorAll('img'));
  const offene = bilder.filter(img=>!img.complete);
  if(!offene.length){ setTimeout(()=>window.print(), 60); return; }
  let fertig = 0, gestartet = false;
  const los = ()=>{ if(!gestartet){ gestartet = true; setTimeout(()=>window.print(), 60); } };
  offene.forEach(img=>{
    img.addEventListener('load', ()=>{ if(++fertig>=offene.length) los(); });
    img.addEventListener('error', ()=>{ if(++fertig>=offene.length) los(); });
  });
  setTimeout(los, 4000);
}

      ${(b.lat && b.lng) ? `<tr><td>GPS Koordinaten</td><td>${b.lat}, ${b.lng}</td></tr>` : ''}

    </div>`;
  KATEGORIEN.forEach((kat, ki)=>{
    html += `<div class="druck-kategorie">${esc(kat.name)}</div>`;
    FRAGEN.filter(f=>f.kat===ki).forEach(f=>{
      const a = b.antworten[f.nr] || {};
      if(f.typ === 'text'){
        html += `<div class="druck-frage">

        return;
      }
      const wertKlasse = a.wert==='ja' ? 'druck-wert-ja' : a.wert==='nein' ? 'druck-wert-nein' : 'druck-wert-nb';
      const wertText = a.wert==='ja' ? 'JA' : a.wert==='nein' ? 'NEIN' : a.wert==='nb' ? 'NICHT BEWERTBAR' : 'OFFEN';
      html += `<div class="druck-frage">
        <div>${f.nr}. ${esc(f.text)}${f.sicher ? ' (sicherheitsrelevant)' : ''}
          <span class="${wertKlasse}"> — ${wertText}</span></div>
        ${a.kommentar ? `<div class="druck-kommentar">Kommentar, ${esc(a.kommentar)}</div>` : ''}
        ${a.foto ? `<img class="druck-foto" src="${a.foto}">` : ''}
      </div>`;
    });
  });
  return html;
}

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.log('Service Worker Fehler', e));
  });
}

zugangPruefen();
</script>
